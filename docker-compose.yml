services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: minerva_mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: minerva_postgres
    environment:
      POSTGRES_DB: minerva
      POSTGRES_USER: minerva
      POSTGRES_PASSWORD: minerva
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minerva"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mosquitto_data:
    driver: local
  postgres_data:
    driver: local
